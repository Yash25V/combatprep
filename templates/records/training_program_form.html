{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}Create Training Program - CombatPrep{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card glass-card border-0 shadow">
            <div class="card-header bg-transparent border-bottom border-secondary p-4">
                <h4 class="fw-bold m-0"><i class="fa-solid fa-clipboard me-2 text-accent"></i>New Training Program</h4>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {{ form|crispy }}
                    <button type="submit" class="btn btn-accent mt-4">Save Program</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary mt-4 ms-2">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
